<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QUASI COMICS</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


<header class="site-header">

    <div class="banner-container">
        <img 
        class="banner" 
        src="images/banner.png" 
        alt="QUASI COMICS">
    </div>


    <nav>

        <a href="#">HOME</a>
        <a href="#">COMICS</a>
        <a href="#">CHARACTERS</a>
        <a href="#">ABOUT</a>

    </nav>

</header>



<main class="container">


<h1 class="heading">
THE QUASI UNIVERSE
</h1>



<section class="character">

    <img 
    class="title"
    src="images/turtleman-title.png"
    alt="Turtle Man">


    <h2 class="name">
        TURTLE MAN
    </h2>


    <img 
    class="cover"
    src="images/turtleman-1.jpg"
    alt="Turtle Man Issue 1">


    <p>
        The legendary hero of QUASI Comics.
        Explore the first adventure.
    </p>


    <button>
        VIEW SERIES
    </button>

</section>





<section class="character">

    <img 
    class="title"
    src="images/slink-title.png"
    alt="The Slink">


    <h2 class="name">
        THE SLINK
    </h2>


    <img 
    class="cover"
    src="images/slink-1.jpg"
    alt="The Slink Issue 1">


    <p>
        A mysterious force moving through the shadows.
        His story begins here.
    </p>


    <button>
        VIEW SERIES
    </button>

</section>


</main>




<footer>

<h2>
QUASI COMICS
</h2>

<p>
Classic Heroes. Timeless Adventures.
</p>

<p>
© 2026 QUASI COMICS
</p>

</footer>

</html>
